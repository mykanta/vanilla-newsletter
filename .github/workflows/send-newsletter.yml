name: Send Vanilla Newsletter

on:
  push:
    branches: [main]
    paths: ['newsletter.html']

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send via Resend SMTP
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          HTML_SIZE=$(wc -c < newsletter.html)
          if [ "$HTML_SIZE" -lt 500 ]; then
            echo "Newsletter HTML too small (${HTML_SIZE} chars) — placeholder detected, skipping send."
            exit 0
          fi

          python3 << 'EOF'
          import smtplib, ssl, subprocess, sys, os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          api_key = os.environ['RESEND_API_KEY']

          with open('newsletter.html', 'r') as f:
              html = f.read()
          print(f"HTML size: {len(html)} chars")

          today = subprocess.run(
              ['date', '+%A, %B %d, %Y'],
              capture_output=True, text=True
          ).stdout.strip()

          msg = MIMEMultipart('alternative')
          msg['Subject'] = f"Vanilla Daily Digest — {today}"
          msg['From'] = "Vanilla Daily Digest <onboarding@resend.dev>"
          msg['To'] = "kanta.myk@gmail.com"
          msg.attach(MIMEText(html, 'html'))

          try:
              context = ssl.create_default_context()
              with smtplib.SMTP_SSL('smtp.resend.com', 465, context=context) as server:
                  server.login('resend', api_key)
                  server.sendmail("onboarding@resend.dev", ["kanta.myk@gmail.com"], msg.as_string())
                  print(f"SUCCESS: Email sent to kanta.myk@gmail.com — {today}")
          except Exception as e:
              print(f"ERROR: {e}")
              sys.exit(1)
          EOF
